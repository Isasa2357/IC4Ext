name: Run output queue resize implementation

on:
  push:
    branches:
      - agent/output-queue-resize

permissions:
  contents: write

jobs:
  apply-resize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/output-queue-resize
          fetch-depth: 0

      - name: Extract and apply patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-output-queue-resize.yml').read_text()
          marker = '      PATCH_B64: >-\n'
          start = text.index(marker) + len(marker)
          end = text.index('\n\n    steps:', start)
          encoded = ''.join(line.strip() for line in text[start:end].splitlines())
          Path('/tmp/patch.b64').write_text(encoded)
          PY
          base64 -d /tmp/patch.b64 | gzip -d > /tmp/apply-output-queue-resize.py
          python /tmp/apply-output-queue-resize.py

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-output-queue-resize.yml
          git rm .github/workflows/run-output-queue-resize.yml
          git add CMakeLists.txt include src tests docs
          git commit -m "Add per-output queue GPU resize"
          git push origin HEAD:agent/output-queue-resize

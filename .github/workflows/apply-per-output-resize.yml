name: Apply per-output resize implementation

on:
  push:
    branches:
      - agent/per-output-resize

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/per-output-resize
          fetch-depth: 0

      - name: Apply implementation
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8-sig')
              if old not in text:
                  raise SystemExit(f'pattern not found in {path}: {old[:80]!r}')
              p.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          replace('include/IC4Ext/Config.hpp',
          '''struct CameraThreadOptions
          {
              std::uint32_t readTimeoutMs = 1000;
              bool copyPerOutputQueue = true;
              bool stopOnReadError = false;
          };''',
          '''struct CameraThreadOptions
          {
              std::uint32_t readTimeoutMs = 1000;
              bool copyPerOutputQueue = true;
              bool stopOnReadError = false;
          };

          struct CameraOutputQueueOptions
          {
              // width == 0 and height == 0 keep the original frame size.
              // When resizing is enabled, both values must be greater than zero.
              int width = 0;
              int height = 0;

              bool resizeEnabled() const noexcept { return width > 0 && height > 0; }
              bool valid() const noexcept
              {
                  return (width == 0 && height == 0) || (width > 0 && height > 0);
              }
          };''')

          replace('include/IC4Ext/Core/CoreTypes.hpp',
          '''    std::uint64_t copiedFrames = 0;
              std::uint64_t copyFailures = 0;
              std::uint64_t noOutputDrops = 0;''',
          '''    std::uint64_t copiedFrames = 0;
              std::uint64_t copyFailures = 0;
              std::uint64_t resizedFrames = 0;
              std::uint64_t resizeFailures = 0;
              std::uint64_t noOutputDrops = 0;''')

          for backend in ('D3D11', 'D3D12'):
              header = f'include/IC4Ext/{backend}/{backend}CameraCaptureThread.hpp'
              queue = f'{backend}IndexedFrameQueue'
              frame = f'{backend}CameraFrame'
              resizer = f'{backend}FrameResizer'
              replace(header,
              f'''#include "IC4Ext/{backend}/{backend}FrameCopier.hpp"''',
              f'''#include "IC4Ext/{backend}/{backend}FrameCopier.hpp"\n#include "IC4Ext/{backend}/{backend}FrameResizer.hpp"''')
              replace(header,
              f'''    void addOutputQueue(std::uint32_t cameraIndex,
                                  std::shared_ptr<{queue}> queue);''',
              f'''    void addOutputQueue(std::uint32_t cameraIndex,
                                  std::shared_ptr<{queue}> queue);
              void addOutputQueue(std::uint32_t cameraIndex,
                                  std::shared_ptr<{queue}> queue,
                                  CameraOutputQueueOptions options);''')
              replace(header,
              f'''        std::uint32_t cameraIndex = 0;
                  std::shared_ptr<{queue}> queue;''',
              f'''        std::uint32_t cameraIndex = 0;
                  std::shared_ptr<{queue}> queue;
                  CameraOutputQueueOptions options;''')
              replace(header,
              f'''    {resizer.replace('Resizer','Copier')} copier_;''',
              f'''    {resizer.replace('Resizer','Copier')} copier_;
              {resizer} resizer_;''')

          Path('include/IC4Ext/D3D11/D3D11FrameResizer.hpp').write_text(r'''#pragma once

#include "IC4Ext/Core/Error.hpp"
#include "IC4Ext/D3D11/D3D11CameraFrame.hpp"
#include "IC4Ext/D3D11/D3D11FenceManager.hpp"

#include <D3D11Helper/D3D11Processing/D3D11Processing.hpp>

namespace IC4Ext {

class D3D11FrameResizer
{
public:
    bool initialize(D3D11CoreLib::D3D11Core* core, D3D11FenceManager* fenceManager);
    bool resizeFrame(const D3D11CameraFrame& src, int width, int height, D3D11CameraFrame& dst);
    const ErrorInfo& lastError() const noexcept { return lastError_; }

private:
    void setError(ErrorCode code, const char* where, const std::string& message);

    D3D11CoreLib::D3D11Core* core_ = nullptr;
    D3D11FenceManager* fenceManager_ = nullptr;
    D3D11CoreLib::Processing::D3D11ProcessingContext processingContext_;
    D3D11CoreLib::Processing::D3D11Resizer resizer_;
    ErrorInfo lastError_;
};

} // namespace IC4Ext
''', encoding='utf-8', newline='\n')

          Path('src/D3D11/D3D11FrameResizer.cpp').write_text(r'''#include "IC4Ext/D3D11/D3D11FrameResizer.hpp"

#include <exception>

namespace IC4Ext {

void D3D11FrameResizer::setError(ErrorCode code, const char* where, const std::string& message)
{
    lastError_ = MakeError(code, where, message);
}

bool D3D11FrameResizer::initialize(D3D11CoreLib::D3D11Core* core, D3D11FenceManager* fenceManager)
{
    lastError_ = NoError();
    if (!core || !fenceManager) {
        setError(ErrorCode::InvalidArgument, "D3D11FrameResizer::initialize", "core/fence manager is null");
        return false;
    }
    try {
        core_ = core;
        fenceManager_ = fenceManager;
        processingContext_.Initialize(*core_);
        resizer_.Initialize(processingContext_);
        return true;
    } catch (const std::exception& e) {
        setError(ErrorCode::D3D11Error, "D3D11FrameResizer::initialize", e.what());
        return false;
    }
}

bool D3D11FrameResizer::resizeFrame(const D3D11CameraFrame& src, int width, int height, D3D11CameraFrame& dst)
{
    lastError_ = NoError();
    dst = {};
    if (!core_ || !fenceManager_ || !src.texture || width <= 0 || height <= 0) {
        setError(ErrorCode::InvalidArgument, "D3D11FrameResizer::resizeFrame", "invalid source or output size");
        return false;
    }
    try {
        if (src.ready.isValid()) src.ready.wait(INFINITE);
        const auto srcDesc = src.texture->GetDesc();
        auto output = resizer_.CreateOutputTexture(*core_, static_cast<UINT>(width), static_cast<UINT>(height), srcDesc.Format);
        auto srcViews = D3D11CoreLib::Processing::CreateRgbaTextureViewSetView(
            processingContext_, D3D11CoreLib::D3D11ResourceView(src.texture.Get()), true, false, srcDesc.Format);
        auto dstViews = D3D11CoreLib::Processing::CreateRgbaTextureViewSet(
            processingContext_, output, true, true, srcDesc.Format);

        D3D11CoreLib::Processing::ResizeDesc desc;
        desc.srcRect = {0, 0, static_cast<UINT>(src.format.width), static_cast<UINT>(src.format.height)};
        desc.dstRect = {0, 0, static_cast<UINT>(width), static_cast<UINT>(height)};
        resizer_.DispatchResizeView(
            core_->GetImmediateContext(),
            D3D11CoreLib::D3D11ResourceView(src.texture.Get()),
            D3D11CoreLib::D3D11ResourceView(output.Get()),
            desc);

        dst.texture = output.AsTexture2D();
        dst.srv = dstViews.srv;
        dst.uav = dstViews.uav;
        dst.ready = fenceManager_->signal();
        if (!dst.ready.isValid()) {
            setError(ErrorCode::D3D11Error, "D3D11FrameResizer::resizeFrame", fenceManager_->lastError().message);
            return false;
        }
        dst.timing = src.timing;
        dst.format = src.format;
        dst.format.width = width;
        dst.format.height = height;
        dst.chunkMetadata = src.chunkMetadata;
        return true;
    } catch (const std::exception& e) {
        setError(ErrorCode::D3D11Error, "D3D11FrameResizer::resizeFrame", e.what());
        return false;
    }
}

} // namespace IC4Ext

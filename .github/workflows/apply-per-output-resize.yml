          Path('docs/design/17_PerOutputResize.md').write_text(r'''# CameraCaptureThread per-output resize

`D3D11CameraCaptureThread` and `D3D12CameraCaptureThread` can resize a frame independently for each registered output queue immediately before the queue push.

```cpp
captureThread.addOutputQueue(0, originalQueue); // no resize

IC4Ext::CameraOutputQueueOptions preview;
preview.width = 640;
preview.height = 360;
captureThread.addOutputQueue(0, previewQueue, preview);
```

The existing two-argument overload remains source-compatible and sends the original dimensions. `{0, 0}` also means pass-through. Both dimensions must be positive to enable resize; partial and negative specifications are rejected.

Resize is an exact stretch to the requested width and height with the D3D11Helper/D3D12Helper linear GPU resizer. It does not preserve aspect ratio or add letterboxing. Frame timing, frame number, device timestamp, and chunk metadata are preserved. `FrameFormatMetadata::width` and `height` are changed to the resized dimensions.

Each resize output owns a distinct GPU texture and ready token. Pass-through outputs retain the existing copy behavior. When `copyPerOutputQueue` is false, only the first registered output is processed, matching the existing behavior.
''', encoding='utf-8', newline='\n')


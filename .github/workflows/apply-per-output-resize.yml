          Path('include/IC4Ext/D3D12/D3D12FrameResizer.hpp').write_text(r'''#pragma once

#include "IC4Ext/Core/Error.hpp"
#include "IC4Ext/D3D12/D3D12BackendContext.hpp"
#include "IC4Ext/D3D12/D3D12CameraFrame.hpp"
#include "IC4Ext/D3D12/D3D12FenceManager.hpp"

#include <D3D12Helper/D3D12Processing/D3D12Processing.hpp>

#include <array>

namespace IC4Ext {

class D3D12FrameResizer
{
public:
    bool initialize(const D3D12BackendContext& backend, D3D12FenceManager* fenceManager);
    bool resizeFrame(const D3D12CameraFrame& src, int width, int height, D3D12CameraFrame& dst);
    const ErrorInfo& lastError() const noexcept { return lastError_; }

private:
    struct Slot
    {
        D3D12CoreLib::D3D12DescriptorAllocator cbvSrvUav;
        D3D12CoreLib::D3D12DescriptorAllocator sampler;
        D3D12CoreLib::Processing::D3D12ProcessingContext processingContext;
        D3D12CoreLib::Processing::D3D12Resizer resizer;
        D3D12CoreLib::D3D12CommandContext commandContext;
        D3D12ReadyToken inFlight;
    };

    Slot& acquireSlot();
    bool createSrv(D3D12CameraFrame& frame);
    void setError(ErrorCode code, const char* where, const std::string& message);

    D3D12BackendContext backend_;
    D3D12CoreLib::D3D12Core* core_ = nullptr;
    D3D12CoreLib::D3D12Queue* queue_ = nullptr;
    ID3D12Device* device_ = nullptr;
    D3D12FenceManager* fenceManager_ = nullptr;
    std::array<Slot, 4> slots_{};
    std::size_t nextSlot_ = 0;
    ErrorInfo lastError_;
};

} // namespace IC4Ext
''', encoding='utf-8', newline='\n')

          Path('src/D3D12/D3D12FrameResizer.cpp').write_text(r'''#include "IC4Ext/D3D12/D3D12FrameResizer.hpp"

#include <D3D12Helper/D3D12Framework/D3D12Helpers.hpp>

#include <exception>

namespace IC4Ext {

void D3D12FrameResizer::setError(ErrorCode code, const char* where, const std::string& message)
{
    lastError_ = MakeError(code, where, message);
}

bool D3D12FrameResizer::initialize(const D3D12BackendContext& backend, D3D12FenceManager* fenceManager)
{
    lastError_ = NoError();
    backend_ = backend;
    if (!backend_.resolve() || !backend_.corePtr || !backend_.queue || !fenceManager) {
        setError(ErrorCode::InvalidArgument, "D3D12FrameResizer::initialize", "helper-backed backend/fence manager is required");
        return false;
    }
    try {
        core_ = backend_.corePtr;
        queue_ = backend_.queue;
        device_ = backend_.device;
        fenceManager_ = fenceManager;
        for (auto& slot : slots_) {
            slot.cbvSrvUav.Initialize(device_, D3D12_DESCRIPTOR_HEAP_TYPE_CBV_SRV_UAV, 64, true);
            slot.sampler.Initialize(device_, D3D12_DESCRIPTOR_HEAP_TYPE_SAMPLER, 8, true);
            slot.processingContext.Initialize(*core_, &slot.cbvSrvUav, &slot.sampler);
            slot.resizer.Initialize(slot.processingContext);
            slot.commandContext.Initialize(device_, queue_->GetType());
        }
        return true;
    } catch (const std::exception& e) {
        setError(ErrorCode::D3D12Error, "D3D12FrameResizer::initialize", e.what());
        return false;
    }
}

D3D12FrameResizer::Slot& D3D12FrameResizer::acquireSlot()
{
    auto& slot = slots_[nextSlot_++ % slots_.size()];
    if (slot.inFlight.isValid()) slot.inFlight.wait(INFINITE);
    slot.inFlight = {};
    slot.cbvSrvUav.Reset();
    slot.sampler.Reset();
    slot.commandContext.Reset();
    return slot;
}

bool D3D12FrameResizer::createSrv(D3D12CameraFrame& frame)
{
    frame.srvHeapHelper.Initialize(device_, D3D12_DESCRIPTOR_HEAP_TYPE_CBV_SRV_UAV, 1, true);
    frame.srvHeap = frame.srvHeapHelper.Get();
    auto handle = frame.srvHeapHelper.GetHandle(0);
    D3D12CoreLib::CreateTexture2DSrv(*core_, frame.textureResource, handle.cpu, frame.dxgiFormat);
    frame.srvCpuHandle = handle.cpu;
    frame.srvGpuHandle = handle.gpu;
    return true;
}

bool D3D12FrameResizer::resizeFrame(const D3D12CameraFrame& src, int width, int height, D3D12CameraFrame& dst)
{
    lastError_ = NoError();
    dst = {};
    if (!core_ || !queue_ || !src.texture || width <= 0 || height <= 0) {
        setError(ErrorCode::InvalidArgument, "D3D12FrameResizer::resizeFrame", "invalid source or output size");
        return false;
    }
    try {
        if (src.ready.isValid()) src.ready.wait(INFINITE);
        auto& slot = acquireSlot();
        const auto srcDesc = src.texture->GetDesc();
        dst.textureResource = slot.resizer.CreateOutputTexture(
            *core_, static_cast<UINT>(width), static_cast<UINT>(height), srcDesc.Format,
            D3D12_RESOURCE_STATE_COMMON);
        dst.texture = dst.textureResource.Get();

        D3D12CoreLib::Processing::ResizeDesc desc;
        desc.srcRect = {0, 0, static_cast<UINT>(src.format.width), static_cast<UINT>(src.format.height)};
        desc.dstRect = {0, 0, static_cast<UINT>(width), static_cast<UINT>(height)};
        D3D12CoreLib::Processing::D3D12ProcessingStateDesc states;
        states.srcBefore = src.resourceState;
        states.srcAfter = src.resourceState;
        states.dstBefore = D3D12_RESOURCE_STATE_COMMON;
        states.dstAfter = D3D12_RESOURCE_STATE_COMMON;
        states.useExplicitStates = true;
        slot.resizer.RecordResizeView(
            slot.commandContext,
            D3D12CoreLib::D3D12ResourceView(src.texture.Get()),
            D3D12CoreLib::D3D12ResourceView(dst.texture.Get()),
            desc,
            states);

        slot.commandContext.Close();
        ID3D12CommandList* lists[] = {slot.commandContext.GetCommandList()};
        queue_->ExecuteCommandLists(1, lists);
        const auto fenceValue = queue_->Signal();
        dst.ready = fenceManager_->makeToken(fenceValue);
        slot.inFlight = dst.ready;

        dst.dxgiFormat = srcDesc.Format;
        dst.resourceState = D3D12_RESOURCE_STATE_COMMON;
        dst.textureResource.SetState(dst.resourceState);
        dst.timing = src.timing;
        dst.format = src.format;
        dst.format.width = width;
        dst.format.height = height;
        dst.chunkMetadata = src.chunkMetadata;
        return createSrv(dst);
    } catch (const std::exception& e) {
        setError(ErrorCode::D3D12Error, "D3D12FrameResizer::resizeFrame", e.what());
        return false;
    }
}

} // namespace IC4Ext

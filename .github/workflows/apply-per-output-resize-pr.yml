name: Apply per-output resize on PR

on:
  pull_request:
    branches:
      - agent/dynamic-output-queues

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/per-output-resize
          fetch-depth: 0
      - name: Extract implementation script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/apply-per-output-resize.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == '- name: Apply implementation')
          run_line = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(lines)) if lines[i].startswith('      - name: Commit implementation'))
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[run_line + 1:end]) + '\n'
          Path('/tmp/apply_resize.py').write_text(script)
          PY
      - name: Run implementation script
        id: apply_script
        continue-on-error: true
        shell: bash
        run: python /tmp/apply_resize.py 2> /tmp/apply_resize_error.txt
      - name: Report implementation error
        if: steps.apply_script.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          printf 'Resize implementation workflow failed:\n\n```text\n' > /tmp/comment.md
          cat /tmp/apply_resize_error.txt >> /tmp/comment.md
          printf '\n```\n' >> /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
          exit 1
      - name: Commit implementation
        if: steps.apply_script.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-per-output-resize.yml
          git rm .github/workflows/apply-per-output-resize-pr.yml
          git rm -f docs/.per-output-resize-trigger
          git add include src tests docs
          git commit -m "Add per-output CameraCaptureThread resizing"
          git push origin HEAD:agent/per-output-resize

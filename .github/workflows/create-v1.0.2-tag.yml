name: Create v1.0.2 tag

on:
  push:
    branches:
      - agent/dynamic-output-queues

permissions:
  contents: write

jobs:
  create-tag:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-output-queues
          fetch-depth: 0

      - name: Create annotated tag
        shell: bash
        run: |
          if git rev-parse "refs/tags/v1.0.2" >/dev/null 2>&1; then
            echo "Tag v1.0.2 already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a v1.0.2 53ccaf1349acc950d6b4c9dd3231fddbe5d6035e -m "IC4Ext v1.0.2"
          git push origin refs/tags/v1.0.2

      - name: Remove temporary workflow
        shell: bash
        run: |
          git rm .github/workflows/create-v1.0.2-tag.yml
          git commit -m "Remove temporary tag workflow"
          git push origin HEAD:agent/dynamic-output-queues

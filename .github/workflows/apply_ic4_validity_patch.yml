name: Apply IC4 SDK validity compatibility patch

on:
  push:
    branches:
      - fix/ic4-sdk-validity-50db

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Replace obsolete implicit-validity checks
        shell: python
        run: |
          from pathlib import Path

          def replace(path: str, old: str, new: str, minimum: int = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count < minimum:
                  raise RuntimeError(f"{path}: expected at least {minimum} occurrence(s) of {old!r}, found {count}")
              file.write_text(text.replace(old, new), encoding="utf-8")
              print(f"{path}: replaced {count} occurrence(s): {old!r}")

          # IC Imaging Control 4 1.5+ no longer provides the old implicit
          # truthiness used by these value types. Use the documented is_valid()
          # state query explicitly instead.
          replace(
              "include/IC4Ext/Core/IC4ChunkMetadata.hpp",
              "if (!grabber || !(*grabber) || !imageBuffer)",
              "if (!grabber || !grabber->is_valid() || !imageBuffer)",
          )
          replace(
              "include/IC4Ext/Core/IC4ChunkMetadata.hpp",
              "if (propErr.isError() || !props)",
              "if (propErr.isError() || !props.is_valid())",
          )

          replace(
              "src/Core/IC4PerformanceUtil.hpp",
              "if (!grabber || !(*grabber))",
              "if (!grabber || !grabber->is_valid())",
              minimum=2,
          )
          replace(
              "src/Core/IC4PerformanceUtil.hpp",
              "if (propErr.isError() || !props)",
              "if (propErr.isError() || !props.is_valid())",
          )
          replace(
              "src/Core/IC4PerformanceUtil.hpp",
              "if (!selectorErr.isError() && selector)",
              "if (!selectorErr.isError() && selector.is_valid())",
          )

          for path in (
              "src/D3D11/D3D11CameraCapture.cpp",
              "src/D3D12/D3D12CameraCapture.cpp",
          ):
              replace(path, "(*impl_->grabber)", "impl_->grabber->is_valid()")
              replace(path, "(*grabber)", "grabber->is_valid()")
              replace(
                  path,
                  "if (error.isError() || !properties)",
                  "if (error.isError() || !properties.is_valid())",
              )

          # Guard against accidentally leaving the obsolete forms in the files
          # that are compiled by the D3D11/D3D12 backends.
          forbidden = (
              "(*grabber)",
              "(*impl_->grabber)",
              "propErr.isError() || !props",
              "!selectorErr.isError() && selector)",
              "error.isError() || !properties)",
          )
          checked = [
              Path("include/IC4Ext/Core/IC4ChunkMetadata.hpp"),
              Path("src/Core/IC4PerformanceUtil.hpp"),
              Path("src/D3D11/D3D11CameraCapture.cpp"),
              Path("src/D3D12/D3D12CameraCapture.cpp"),
          ]
          for file in checked:
              text = file.read_text(encoding="utf-8")
              remaining = [needle for needle in forbidden if needle in text]
              if remaining:
                  raise RuntimeError(f"{file}: obsolete validity expressions remain: {remaining}")

      - name: Commit compatibility fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add include/IC4Ext/Core/IC4ChunkMetadata.hpp \
                  src/Core/IC4PerformanceUtil.hpp \
                  src/D3D11/D3D11CameraCapture.cpp \
                  src/D3D12/D3D12CameraCapture.cpp
          git commit -m "Use explicit IC4 object validity checks"
          git push origin HEAD:${{ github.ref_name }}

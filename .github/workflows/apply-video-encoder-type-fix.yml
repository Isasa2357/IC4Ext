name: Apply video encoder type fix

on:
  push:
    branches:
      - agent/dynamic-output-queues

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-output-queues
          fetch-depth: 0

      - name: Replace obsolete type name
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('samples/MultiCameraSyncDisplayD3D12/main.cpp')
          text = path.read_text(encoding='utf-8')
          old = 'D3DVideoEncoderLib::D3D12VideoEncoderBackendType::D3D12VideoEncode'
          new = 'D3DVideoEncoderLib::D3DVideoEncoderBackendType::D3D12VideoEncode'
          if old not in text:
              raise SystemExit('obsolete type name was not found')
          path.write_text(text.replace(old, new), encoding='utf-8', newline='\n')
          PY

      - name: Commit corrected source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-video-encoder-type-fix.yml
          git add samples/MultiCameraSyncDisplayD3D12/main.cpp
          git commit -m "Fix D3D12 video encoder backend type"
          git push origin HEAD:agent/dynamic-output-queues

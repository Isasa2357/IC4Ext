name: Apply output queue resize implementation

on:
  push:
    branches:
      - agent/output-queue-resize

permissions:
  contents: write

jobs:
  apply-resize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PATCH_B64: >-
        

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/output-queue-resize
          fetch-depth: 0

      - name: Apply source changes
        shell: bash
        run: |
          printf '%s' "$PATCH_B64" | base64 -d | gzip -d > /tmp/apply-output-queue-resize.py
          python /tmp/apply-output-queue-resize.py

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-output-queue-resize.yml
          git add CMakeLists.txt include src tests docs
          git commit -m "Add per-output queue GPU resize"
          git push origin HEAD:agent/output-queue-resize
